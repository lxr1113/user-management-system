# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/user_management?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.example.usermanagement.mybatis.entity
mybatis.configuration.map-underscore-to-camel-case=true
server.port=8080

# 日志配置
logging.level.com.example.usermanagement.mapper=debug

# Swagger/Knife4j 配置
swagger.title=用户管理系统 API
swagger.description=用户管理系统 RESTful API 文档
swagger.version=1.0.0
swagger.enable=true
